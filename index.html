<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Para ti 💖</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
</head>
<body>
  <canvas id="starCanvas" aria-hidden="true"></canvas>
  <div class="scene">
    <div class="tree-section" aria-hidden="true">
      <canvas id="treeCanvas"></canvas>
    </div>
    <div class="content-section">
      <div class="message-box">
        <p class="message-text" id="mainMessage">Para la niña más bonita —</p>
        <div id="texto-animado" class="typewriter-text" aria-live="polite"></div>
      </div>
      <div class="bears" aria-label="Pollitos animados">
        <div class="bear bear-left">🐥</div>
        <div class="bear bear-right">🐥</div>
      </div>
      <div class="counter-box" aria-live="polite">
        <p class="counter-label">Nuestros caminos se cruzaron hace...</p>
        <p class="counter-time" id="counter">...</p>
      </div>
    </div>
  </div>
  <div id="heartBurst" aria-hidden="true"></div>
  <script src="script.js"></script>
</body>
</html>
